name: Publish HengJie 0.7.0 source

on:
  push:
    paths:
      - .github/workflows/publish-070.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Publish reviewed source snapshot
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > "$RUNNER_TEMP/hengjie-source.tar.gz"
          tar -xzf "$RUNNER_TEMP/hengjie-source.tar.gz"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Add clipboard history in HengJie 0.7.0'
          git push origin HEAD:main
