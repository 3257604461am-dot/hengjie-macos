name: Publish HengJie 0.8.0 source
on:
  push:
    paths:
      - .github/workflows/publish-hengjie-080.yml
permissions:
  contents: write
  pull-requests: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Create source branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name '3257604461am-dot'
          git config user.email '289455581+3257604461am-dot@users.noreply.github.com'
          git switch -c codex/hengjie-0.8.0
          python3 - <<'PY'
          import base64, json, pathlib
          files = json.loads(base64.b64decode(''))
          for path, value in files.items():
              target = pathlib.Path(path)
              target.parent.mkdir(parents=True, exist_ok=True)
              target.write_bytes(base64.b64decode(value))
          PY
          chmod +x scripts/build-app.sh
          rm .github/workflows/publish-hengjie-080.yml
          git add -A
          git commit -m 'Release HengJie 0.8.0'
          git push origin codex/hengjie-0.8.0
          git switch main
          git rm .github/workflows/publish-hengjie-080.yml
          git commit -m 'Remove temporary 0.8.0 source workflow'
          git push origin main
          gh pr create --repo "${{ github.repository }}" --base main --head codex/hengjie-0.8.0 --draft --title 'Release HengJie 0.8.0' --body '## 更新内容\n- 提升横向与纵向滚动拼接稳定性\n- 重做菜单面板、分类设置与快捷键录制\n- 增加本地诊断日志与问题诊断导出\n- 优化剪贴板历史性能并增加搜索筛选\n\n## 验证\n- swift build -c debug --product HengJie\n- swift run HengJieCoreChecks\n- Release arm64 构建、ad-hoc 签名与 ZIP 校验'
name: Publish HengJie 0.8.0 source
on:
  push:
    paths:
      - .github/workflows/publish-hengjie-080.yml
permissions:
  contents: write
  pull-requests: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
