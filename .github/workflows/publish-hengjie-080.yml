      - name: Create source branch
        env:
          SNAPSHOT_B64: 
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name '3257604461am-dot'
          git config user.email '289455581+3257604461am-dot@users.noreply.github.com'
          git switch -c codex/hengjie-0.8.0
