name: Normalize release asset name

on:
  push:
    paths:
      - .github/workflows/rename-asset.yml

permissions:
  contents: write

jobs:
  rename:
    runs-on: ubuntu-latest
    steps:
      - name: Rename release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ID=$(gh api repos/3257604461am-dot/hengjie-macos/releases/tags/v0.6.2 --jq '.assets[] | select(.name == "-0.6.2-arm64.zip") | .id')
          gh api -X PATCH "repos/3257604461am-dot/hengjie-macos/releases/assets/$ID" -f name=HengJie-0.6.2-arm64.zip
