name: Publish v0.6.2 release

on:
  push:
    paths:
      - .github/workflows/release-final.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Create public release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > "$RUNNER_TEMP/横截-0.6.2-arm64.zip"
          printf '%s' '' | base64 --decode > "$RUNNER_TEMP/release-notes.md"
          TARGET=$(git rev-parse "$GITHUB_SHA^")
          gh release create v0.6.2 "$RUNNER_TEMP/横截-0.6.2-arm64.zip#横截-0.6.2-arm64.zip" --target "$TARGET" --title "横截 0.6.2" --notes-file "$RUNNER_TEMP/release-notes.md"
