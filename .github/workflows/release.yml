name: Build release artifact

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    runs-on: macos-26
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - name: Verify
        run: |
          swift test
          swift run SnapWeaveCoreChecks
          swift run SnapWeaveArchitectureChecks
          swift build -c release --product SnapWeave
      - name: Build ad-hoc artifact
        run: ./scripts/build-app.sh
      - name: Verify ZIP and checksum
        run: |
          unzip -t outputs/SnapWeave-0.11.1-arm64.zip
          shasum -a 256 outputs/SnapWeave-0.11.1-arm64.zip | tee outputs/SnapWeave-0.11.1-arm64.zip.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: SnapWeave-0.11.1-arm64
          path: |
            outputs/SnapWeave-0.11.1-arm64.zip
            outputs/SnapWeave-0.11.1-arm64.zip.sha256
