name: Publish source snapshot

on:
  push:
    paths:
      - .github/workflows/bootstrap.yml

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore reviewed source snapshot
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > "$RUNNER_TEMP/hengjie-source.tar.gz"
          tar -xzf "$RUNNER_TEMP/hengjie-source.tar.gz"
          rm -f .github/workflows/bootstrap.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Publish HengJie 0.6.2 source'
          git push origin HEAD:main
