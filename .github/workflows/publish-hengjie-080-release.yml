name: Publish HengJie 0.8.0 Release

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-hengjie-080-release.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore package chunk 1
        env:
          PART: ''
        run: printf '%s' "$PART" > /tmp/HengJie.zip.b64
      - name: Restore package chunk 2
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 3
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 4
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 5
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 6
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 7
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 8
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 9
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Restore package chunk 10
        env:
          PART: ''
        run: printf '%s' "$PART" >> /tmp/HengJie.zip.b64
      - name: Create public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          base64 --decode /tmp/HengJie.zip.b64 > /tmp/HengJie-0.8.0-arm64.zip
          echo "72056d6f3ecceeda316a4777cb6002b549c228d9c7f8eb712f92b775009feff9  /tmp/HengJie-0.8.0-arm64.zip" | shasum -a 256 -c -
          cat > /tmp/release-notes.md <<'NOTES'
          ## 核心更新

          - 提升横向与纵向长截图的帧采集、重叠匹配、动态遮罩和异常恢复能力。
          - 重做菜单栏功能面板、分类设置页与快捷键录制体验。
          - 新增本地崩溃日志和隐私安全的问题诊断 ZIP 导出。
          - 优化剪贴板历史入库、缩略图缓存，并增加中英日搜索与类型筛选。

          ## 系统要求与权限

          - macOS 14 或更高版本
          - Apple Silicon（arm64）
          - 截图与 GIF 录制需要“屏幕录制”权限
          - 仅自动滚动需要“辅助功能”权限；手动滚动不需要

          ## 安装提示

          安装包采用 ad-hoc 签名，尚未经过 Apple 公证。首次启动如被 macOS 拦截，请在 Finder 中右键应用并选择“打开”。

          ## 文件校验

          - 文件：HengJie-0.8.0-arm64.zip
          - SHA-256：72056d6f3ecceeda316a4777cb6002b549c228d9c7f8eb712f92b775009feff9
          NOTES
          gh release create v0.8.0 /tmp/HengJie-0.8.0-arm64.zip --repo "${{ github.repository }}" --target main --title "横截 0.8.0" --notes-file /tmp/release-notes.md
      - name: Remove temporary publisher
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/publish-hengjie-080-release.yml
          git commit -m "Remove temporary 0.8.0 release publisher"
          git push origin main
