name: macOS CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: macos-26
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Show Swift version
        run: swift --version
      - name: Build HengJie
        run: swift build -c debug --product HengJie
      - name: Run Swift tests
        run: swift test
      - name: Run core checks
        run: |
          swift run HengJieCoreChecks
          swift run HengJieArchitectureChecks
      - name: Build release
        run: swift build -c release --product HengJie
      - name: Scan tracked sources for common secrets
        run: |
          if rg -n '(AKIA[0-9A-Z]{16}|-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----|ghp_[A-Za-z0-9]{30,})' Sources Resources scripts; then
            echo 'Potential secret found in tracked source files.' >&2
            exit 1
          fi
      - name: Build and verify ad-hoc package
        run: |
          ./scripts/build-app.sh
          unzip -t outputs/横截-0.11.0-arm64.zip
