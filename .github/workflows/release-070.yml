name: Publish HengJie 0.7.0 release

on:
  push:
    paths:
      - .github/workflows/release-070.yml

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2
      - name: Create public release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > "$RUNNER_TEMP/HengJie-0.7.0-arm64.zip"
          printf '%s' '' | base64 --decode > "$RUNNER_TEMP/release-notes.md"
          TARGET=$(git rev-parse "$GITHUB_SHA^")
          gh release create v0.7.0 "$RUNNER_TEMP/HengJie-0.7.0-arm64.zip#HengJie-0.7.0-arm64.zip" --target "$TARGET" --title "横截 0.7.0" --notes-file "$RUNNER_TEMP/release-notes.md"
