name: Publish HengJie 0.8.0 Release

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/publish-hengjie-080-release-small.yml'

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Build signed arm64 package
        run: |
          chmod +x scripts/build-app.sh
          scripts/build-app.sh
          cp 'outputs/横截-0.8.0-arm64.zip' /tmp/HengJie-0.8.0-arm64.zip
      - name: Create public release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHA=$(shasum -a 256 /tmp/HengJie-0.8.0-arm64.zip | awk '{print $1}')
          cat > /tmp/release-notes.md <<NOTES
          ## 核心更新

          - 提升横向与纵向长截图的帧采集、重叠匹配、动态遮罩和异常恢复能力。
          - 重做菜单栏功能面板、分类设置页与快捷键录制体验。
          - 新增本地崩溃日志和隐私安全的问题诊断 ZIP 导出。
          - 优化剪贴板历史入库、缩略图缓存，并增加中英日搜索与类型筛选。

          ## 系统要求与权限

          - macOS 14 或更高版本
          - Apple Silicon（arm64）
          - 截图与 GIF 录制需要“屏幕录制”权限
          - 仅自动滚动需要“辅助功能”权限；手动滚动不需要

          ## 安装提示

          安装包采用 ad-hoc 签名，尚未经过 Apple 公证。首次启动如被 macOS 拦截，请在 Finder 中右键应用并选择“打开”。

          ## 文件校验

          - 文件：HengJie-0.8.0-arm64.zip
          - SHA-256：$SHA
          NOTES
          gh release create v0.8.0 /tmp/HengJie-0.8.0-arm64.zip --repo "${{ github.repository }}" --target main --title "横截 0.8.0" --notes-file /tmp/release-notes.md
      - name: Cancel stale publisher and remove temporary workflows
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run cancel 29477231510 --repo "${{ github.repository }}" || true
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/publish-hengjie-080-release.yml .github/workflows/publish-hengjie-080-release-small.yml
          git commit -m "Remove temporary 0.8.0 release publishers"
          git push origin main
